<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Quote Generator</title>
    <link rel="stylesheet" href="styles.css">
    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Noto+Serif+Khitan+Small+Script&family=Roboto+Serif:ital,opsz,wght@0,8..144,100..900;1,8..144,100..900&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">

</head>
<body>
    <h1>Random Quote Generator</h1>
    <div class="quotes">
        <span class="quote-id">3</span>
        <p class="quote-display">You must be the change you wish to see in the world.</p>
        <button class="generate">Generate Quote</button>
        <button class="auto">Auto Generate</button>
        <button class="stop">Stop Generate</button>
    </div>
    <div class="auto-status"></div>
    <script src="index.js"></script>
</body>
</html>
